# Configuration du robot SO-101
# ================================
# Ce fichier documente la configuration hardware.
# Les ports et parametres reels sont dans scripts/config.py

robot:
  type: so101

  leader:
    port: "/dev/tty.usbmodem5A460816001"
    id: "mon_leader"
    calibration: "configs/calibration_leader.json"

  follower:
    port: "/dev/tty.usbmodem5A460830681"
    id: "mon_follower"
    calibration: "configs/calibration_follower.json"

# Camera eye-to-hand (vue globale de la scene)
cameras:
  front:
    type: opencv
    index: 0
    width: 1920
    height: 1080
    fps: 30

# Calibration camera (genere par les scripts)
# calibration_intrinseque: configs/calibration_cam_0.json
# calibration_extrinseque: configs/extrinsic_cam_0.json
